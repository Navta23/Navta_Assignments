<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Say what? <input id="saythis" size=40></p>
    <p>How many times?
        <select id="howmany">
            <option value=10 selected>10</option>
            <option value=20>20</option>
            <option value=30>30</option>
        </select>
    </p>
    <p><button onclick="doLoop()">Do It!</button></p>

    <div id="result" style="background:blanchedalmond; color:brown; height:400px; width:80%">
    </div>
    <script>
        function doLoop(){
            var saywhat = document.getElementById("saythis").value;
            var maxLoop = document.getElementById("howmany").value;
            var str = '';
            for(var i=1; i<=maxLoop;i++){
                str = str + i + " :" + saywhat + "<br/>"
            }
            document.getElementById("result").innerHTML = str;
        }
    </script>

</body>
</html>
