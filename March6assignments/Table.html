<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="2" width="80%" cellpadding="3" cellspacing="3" bgcolor="lightyellow">
        <caption>Student Table</caption>
        <!--merging studid and studname using colspan-->
        <tr>
            <th colspan="2" align="center">StudentID, StudentName</th>
            <th>Course</th>
        </tr>
        <tr>
            <td colspan="2" align="center">101, pawan</td>
            <td colspan="2" align="center">Java</td>
        </tr>
        <tr>
            <td colspan="2" align="center">102, Rishi</td>
            <td align="center">C#</td>
        </tr>
        <tr>
            <td colspan="2" align="center">103, Siddhi</td>
            <td align="center">python</td>
        </tr>
    </table>
    <br>
    <table border="2" width="80%" cellpadding="8" cellspacing="3" bgcolor="lightyellow">
        <caption>Student Table</caption>
        <!--merging studid and studname using colspan-->
        <tr>
            <th>StudentID</th>
            <th>StudentName</th>
            <th>Course</th>
        </tr>
        <tr>
            <td rowspan="2" align="center">101</td>
            <td colspan="2" align="center">pawan</td>
        </tr>
        <tr>
            <td colspan="2" align="center">java</td>
        </tr>
        <tr>
            <td rowspan="2" align="center">102</td>
            <td colspan="2" align="center">rishi</td>
        </tr>
        <tr>
            <td colspan="2" align="center">c#</td>
        </tr>
        <tr>
            <td rowspan="2" align="center">103</td>
            <td colspan="2" align="center">siddhi</td>
        </tr>
        <tr>
            <td colspan="2" align="center">python</td>
        </tr>
    </table>


    
</body>
</html>
